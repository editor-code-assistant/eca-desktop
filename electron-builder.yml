appId: dev.eca.desktop
productName: ECA
artifactName: eca-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - eca-webview/dist/**/*
  - resources/**/*
  - src/renderer/**/*

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  category: Development
  maintainer: Editor Code Assistant

deb:
  fpm:
    - "--after-install=build/linux-after-install.sh"

win:
  icon: resources/icon.png
  target:
    # x64 only: upstream ECA server publishes no windows-aarch64 binary.
    # NSIS (not zip/portable) is required for electron-updater auto-updates.
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: editor-code-assistant
  repo: eca-desktop
