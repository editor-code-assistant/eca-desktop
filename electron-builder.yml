appId: dev.eca.desktop
productName: ECA
artifactName: eca-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - eca-webview/dist/**/*
  - resources/**/*
  - src/renderer/**/*

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

linux:
  # Multi-size set (16-512px) generated from resources/icon.png; the
  # flatpak target silently drops icons >512px, and a proper hicolor
  # set is better for AppImage/deb desktop integration too.
  icon: build/icons
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  category: Development
  maintainer: Editor Code Assistant

deb:
  fpm:
    - "--after-install=build/linux-after-install.sh"

# Built explicitly with `npm run package:flatpak` (or in CI with
# `electron-builder --linux flatpak --x64`) so the default AppImage/deb
# matrix above stays untouched. Requires `flatpak` + `flatpak-builder`
# plus the runtimes/BaseApp installed (see README "Package" section).
# The chromium sandbox is provided by zypak from the Electron BaseApp —
# no SUID chrome-sandbox needed (linux-after-install.sh is deb-only).
flatpak:
  runtimeVersion: '24.08'
  baseVersion: '24.08'
  finishArgs:
    # Windowing (X11/XWayland) + GPU.
    - --share=ipc
    - --socket=x11
    - --device=dri
    # ECA server download/auto-update, LLM providers, MCP servers.
    - --share=network
    # Project files + the managed server binary in ~/.eca-desktop and
    # the shared eca config in ~/.config/eca.
    - --filesystem=home
    # Lets the app spawn the ECA server on the HOST (flatpak-spawn
    # --host) so the agent can use the real toolchain: git, shells,
    # user-configured MCP servers. Without it the app still works but
    # the server runs sandboxed, seeing only the freedesktop runtime.
    - --talk-name=org.freedesktop.Flatpak
  files:
    - ["build/dev.eca.desktop.metainfo.xml", "/share/metainfo/dev.eca.desktop.metainfo.xml"]

win:
  icon: resources/icon.png
  target:
    # x64 only: upstream ECA server publishes no windows-aarch64 binary.
    # NSIS (not zip/portable) is required for electron-updater auto-updates.
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: editor-code-assistant
  repo: eca-desktop
