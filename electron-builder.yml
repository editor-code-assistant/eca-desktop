appId: dev.eca.desktop
productName: ECA
artifactName: eca-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - eca-webview/dist/**/*
  - resources/**/*
  - src/renderer/**/*

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  category: Development
  maintainer: Editor Code Assistant

publish:
  provider: github
  owner: editor-code-assistant
  repo: eca-desktop
