name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug npm config
        run: |
          echo "=== ~/.npmrc ==="
          cat ~/.npmrc 2>/dev/null || echo "not found"
          echo "=== project .npmrc ==="
          cat .npmrc 2>/dev/null || echo "not found"
          echo "=== npm config list ==="
          npm config list
          echo "=== npm config list -l (auth related) ==="
          npm config list -l 2>/dev/null | grep -i -E 'auth|token|registry' || true
          echo "=== env vars ==="
          env | grep -i -E 'npm|node|token|auth' || true
          echo "=== global npmrc path ==="
          npm config get globalconfig
          cat "$(npm config get globalconfig)" 2>/dev/null || echo "not found"

      - name: Clean all npm auth
        run: |
          rm -f ~/.npmrc
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" > eca-webview/.npmrc

      - name: Build
        run: npm run build

      - name: Package & Publish (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package & Publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
