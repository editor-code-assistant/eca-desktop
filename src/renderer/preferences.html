<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';">
    <title>Preferences</title>
    <link href="./theme.css" rel="stylesheet">
    <link href="./preferences.css" rel="stylesheet">
</head>
<body>
    <div id="prefs-root" class="prefs-root"></div>

    <script>
        // theme.css scopes its --eca-* variables to html[data-editor="web"],
        // so opt in here too.
        document.documentElement.setAttribute('data-editor', 'web');

        if (window.ecaDesktop && window.ecaDesktop.platform === 'darwin') {
            document.body.classList.add('platform-darwin');
        }
    </script>

    <script src="./preferences.js"></script>
</body>
</html>
