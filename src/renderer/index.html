<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';">
    <title>ECA Desktop</title>
    <link href="./theme.css" rel="stylesheet">
    <link href="./sidebar.css" rel="stylesheet">
    <link href="./welcome.css" rel="stylesheet">
    <link href="../../eca-webview/dist/assets/index.css" rel="stylesheet">
    <style>
        /* macOS titlebar drag region — covers content area (sidebar has its own) */
        .desktop-titlebar {
            -webkit-app-region: drag;
            height: 38px;
            position: fixed;
            top: 0;
            left: 260px;
            right: 0;
            z-index: 9999;
            pointer-events: none;
        }
        @media (max-width: 767px) {
            .desktop-titlebar { left: 0; }
        }
        /* Ensure interactive elements are not draggable */
        button, input, textarea, select, a, [role="button"] {
            -webkit-app-region: no-drag;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* Add top padding on macOS for the hidden titlebar */
        .platform-darwin .app-content {
            padding-top: 38px;
        }
    </style>
</head>
<body>
    <div class="desktop-titlebar"></div>

    <div class="app-layout">
        <!-- Sidebar: chat list -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">ECA</span>
                <button id="sidebar-new-chat" class="sidebar-new-chat-btn" title="New Chat">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Chat
                </button>
            </div>
            <div id="sidebar-chat-list" class="sidebar-chat-list"></div>
            <div class="sidebar-bottom-actions">
                <button id="sidebar-open-folder" class="sidebar-open-folder-btn" title="New Session">
                    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    New Session
                </button>
            </div>
        </aside>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main content: eca-webview renders here -->
        <main class="app-content">
            <div id="welcome-screen"></div>
            <div id="root"></div>
        </main>
    </div>

    <script>
        // Set media URL for eca-webview assets (logo, etc.)
        window.mediaUrl = "../../eca-webview/dist";

        // Set editor type so eca-webview uses the pluggable web transport
        localStorage.setItem("editor", '"web"');

        // Detect platform and add class for platform-specific styling
        if (window.ecaDesktop && window.ecaDesktop.platform === 'darwin') {
            document.body.classList.add('platform-darwin');
        }

        // Wire up the transport bridge
        // Outbound: webview -> main process -> ECA server
        window.__ecaWebTransport = {
            send: function(message) {
                if (window.ecaDesktop) {
                    window.ecaDesktop.send(message);
                }
            }
        };

        // Inbound: ECA server -> main process -> webview
        if (window.ecaDesktop) {
            window.ecaDesktop.onMessage(function(message) {
                window.postMessage(message, '*');
            });
        }
    </script>

    <!-- Welcome screen logic -->
    <script src="./welcome.js"></script>

    <!-- Sidebar logic (must run after ecaDesktop is available) -->
    <script src="./sidebar.js"></script>

    <!-- eca-webview app -->
    <script type="module" src="../../eca-webview/dist/assets/index.js"></script>
</body>
</html>
