<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self';">
    <title>ECA Desktop</title>
    <link href="./theme.css" rel="stylesheet">
    <link href="./sidebar.css" rel="stylesheet">
    <link href="./welcome.css" rel="stylesheet">
    <link href="../../eca-webview/dist/assets/index.css" rel="stylesheet">
    <style>
        /* macOS-only titlebar drag region.
         *
         * The native window frame is hidden on macOS (see main.ts
         * `titleBarStyle: 'hidden'` + `frame: false`), so we need a
         * custom drag region to let users move the window by the top
         * 38px. On Windows/Linux the OS draws its own titlebar above
         * the webview area, so this div must NOT render there — even
         * with pointer-events:none, `-webkit-app-region: drag` still
         * captures clicks at the OS level, which would make the top
         * 38px of the ChatSubHeader (MCPs, usage, trust, export,
         * settings…) un-clickable. Gated on the .platform-darwin body
         * class set at the bottom of this file. */
        .desktop-titlebar {
            display: none;
            -webkit-app-region: drag;
            height: 38px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            pointer-events: none;
        }
        .platform-darwin .desktop-titlebar {
            display: block;
        }
        /* Ensure interactive elements are not draggable */
        button, input, textarea, select, a, [role="button"] {
            -webkit-app-region: no-drag;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* Add top padding on macOS for the hidden titlebar */
        .platform-darwin .app-content {
            padding-top: 38px;
        }
    </style>
</head>
<body>
    <div class="desktop-titlebar"></div>

    <div class="app-layout">
        <!-- Sidebar: chat list -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title-group">
                    <!-- Logo rendered via CSS mask (see sidebar.css .sidebar-logo)
                         so it can be recolored per theme from theme.css's
                         --eca-logo-fg custom property. -->
                    <span class="sidebar-logo" role="img" aria-label="ECA"></span>
                    <span class="sidebar-title">ECA</span>
                </div>
                <button id="sidebar-new-chat" class="sidebar-new-chat-btn" title="New Chat">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span class="sidebar-btn-label">New Chat</span>
                </button>
            </div>
            <div id="sidebar-chat-list" class="sidebar-chat-list"></div>
            <div class="sidebar-bottom-actions">
                <button id="sidebar-open-folder" class="sidebar-open-folder-btn" title="New Session">
                    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span class="sidebar-btn-label">New Session</span>
                </button>
            </div>
        </aside>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main content: eca-webview renders here -->
        <main class="app-content">
            <div id="welcome-screen"></div>
            <div id="root"></div>
        </main>
    </div>

    <!-- Index bootstrap: transport bridge, platform detection, media URL.
         Extracted from an inline <script> so CSP can drop 'unsafe-inline'. -->
    <script type="module" src="./index-bootstrap.js"></script>

    <!-- Welcome screen logic -->
    <script src="./welcome.js"></script>

    <!-- Sidebar logic (must run after ecaDesktop is available) -->
    <script src="./sidebar.js"></script>

    <!-- eca-webview app -->
    <script type="module" src="../../eca-webview/dist/assets/index.js"></script>
</body>
</html>
